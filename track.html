<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHF POINT — অর্ডার ট্র্যাকিং</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
:root {
  --g1:#0d3320; --g2:#1a5c38; --g3:#2d8a57;
  --bg:#f2f5f2; --card:#fff;
  --text:#111; --muted:#6b7280; --border:#dde8dd;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

.header{background:linear-gradient(135deg,var(--g1),var(--g2));padding:14px 16px;display:flex;align-items:center;gap:10px;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.hlogo{width:34px;height:34px;border-radius:9px;overflow:hidden}
.hlogo img{width:100%;height:100%;object-fit:cover}
.htitle{font-size:16px;font-weight:800;letter-spacing:1px}

#map {flex:1; width:100%; background:#e5e7eb; position:relative; z-index:1}

.info-card {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  width: calc(100% - 32px); max-width: 450px;
  background: var(--card); border-radius: 20px; padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 1px solid var(--border);
  z-index: 100;
}
.status-badge {
  display: inline-block; padding: 4px 12px; border-radius: 12px;
  font-size: 12px; font-weight: 700; margin-bottom: 10px;
}
.s-Pending { background: #fff3cd; color: #856404; }
.s-Processing { background: #dbeafe; color: #1e40af; }
.s-Delivered { background: #d1fae5; color: #065f46; }

.rider-info { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
.rider-icon { font-size: 32px; background: #e8f5e9; padding: 10px; border-radius: 50%; }
.rider-details { flex: 1; }
.rider-name { font-size: 15px; font-weight: 700; color: var(--text); }
.tracking-status { font-size: 12px; color: var(--muted); margin-top: 2px; }

.pulse-dot {
  width: 10px; height: 10px; background: #dc2626; border-radius: 50%;
  display: inline-block; margin-right: 6px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
  70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(220, 38, 38, 0); }
  100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
}
.error-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

  <div class="header">
    <div class="hlogo"><img src="https://i.ibb.co/5WTs2rWR/Web-Icon-512-512x512.png" /></div>
    <div><div class="htitle">CHF POINT — লাইভ ট্র্যাকিং</div></div>
  </div>

  <div id="map"></div>

  <div class="info-card" id="info-panel">
    <div class="error-state">অর্ডার আইডি খোঁজা হচ্ছে...</div>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDKeJSj8d3zRVtVWDEG6vjf8uRqPeQeWUU",
  authDomain: "chf-point1.firebaseapp.com",
  projectId: "chf-point1",
  storageBucket: "chf-point1.firebasestorage.app",
  messagingSenderId: "951665597653",
  appId: "1:951665597653:web:bca64bd833f769849ed65c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const orderId = urlParams.get('id');

const infoPanel = document.getElementById("info-panel");
let map, riderMarker;

function initMap(lat, lng) {
  map = L.map('map').setView([lat, lng], 16);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  const riderIcon = L.divIcon({
    html: '<div style="font-size: 30px; transform: translate(-5px, -10px);">🏍️</div>',
    className: 'custom-rider-icon',
    iconSize: [30, 30]
  });

  riderMarker = L.marker([lat, lng], {icon: riderIcon}).addTo(map);
}

if (!orderId) {
  infoPanel.innerHTML = '<div class="error-state">❌ কোনো বৈধ অর্ডার আইডি পাওয়া যায়নি!</div>';
} else {
  onSnapshot(doc(db, "orders", orderId), (docSnap) => {
    if (!docSnap.exists()) {
      infoPanel.innerHTML = '<div class="error-state">❌ অর্ডারটি ডেটাবেসে খুঁজে পাওয়া যায়নি।</div>';
      return;
    }

    const order = docSnap.data();
    const status = order.status || 'Pending';
    const rLat = order.riderLat;
    const rLng = order.riderLng;

    if (rLat && rLng) {
      if (!map) {
        initMap(rLat, rLng);
      } else {
        riderMarker.setLatLng([rLat, rLng]);
        map.panTo([rLat, rLng]);
      }
    }

    let trackingMessage = (rLat && rLng) 
      ? `<span class="pulse-dot"></span> রাইডার আপনার দিকে আসছেন...` 
      : `⌛ রাইডার এখনো ডেলিভারি শুরু করেননি।`;

    infoPanel.innerHTML = `
      <div class="status-badge s-${status}">${status}</div>
      <div class="rider-name">📦 অর্ডার আইডি: <strong>#${orderId.substring(0,8).toUpperCase()}</strong></div>
      <div style="font-size:13px; color:var(--muted); margin-top:4px;">📍 গন্তব্য: ${order.address || 'ঠিকানা পাওয়া যায়নি'}</div>
      <hr style="margin:12px 0; border:0; border-top:1px solid var(--border);">
      <div class="rider-info">
        <div class="rider-icon">🛵</div>
        <div class="rider-details">
          <div class="rider-name">${order.name || 'কাস্টমার'} এর অর্ডার</div>
          <div class="tracking-status">${trackingMessage}</div>
        </div>
      </div>
    `;
  });
}
</script>
</body>
</html>
